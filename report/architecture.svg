<svg xmlns="http://www.w3.org/2000/svg" width="760" height="620" viewBox="0 0 760 620" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="620" fill="white"/>

  <!-- Node A: raw -->
  <rect x="285" y="20" width="190" height="48" rx="8" fill="#ECEAE2" stroke="#5F5E5A" stroke-width="1"/>
  <text x="380" y="49" text-anchor="middle" font-size="15" fill="#2C2C2A">HomeC.csv (thô)</text>

  <!-- B -->
  <rect x="265" y="100" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="380" y="124" text-anchor="middle" font-size="14" fill="#0C447C">Step 1-3: Tiền xử lý và EDA</text>
  <text x="380" y="144" text-anchor="middle" font-size="13" fill="#185FA5">Member B</text>

  <!-- C -->
  <rect x="265" y="188" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="380" y="212" text-anchor="middle" font-size="14" fill="#0C447C">Step 4: Feature Engineering</text>
  <text x="380" y="232" text-anchor="middle" font-size="13" fill="#185FA5">Member C</text>

  <!-- D -->
  <rect x="265" y="276" width="230" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="380" y="300" text-anchor="middle" font-size="14" fill="#26215C">Step 5-8: Train và Tune Model</text>
  <text x="380" y="320" text-anchor="middle" font-size="13" fill="#534AB7">Member A</text>

  <!-- E + F artifacts -->
  <rect x="175" y="372" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="265" y="399" text-anchor="middle" font-size="14" fill="#04342C">best_model.pkl</text>

  <rect x="405" y="372" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="495" y="399" text-anchor="middle" font-size="14" fill="#04342C">feature_columns.pkl</text>

  <!-- Arrows main chain -->
  <line x1="380" y1="68" x2="380" y2="98" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="380" y1="156" x2="380" y2="186" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="380" y1="244" x2="380" y2="274" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="340" y1="332" x2="280" y2="370" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="420" y1="332" x2="480" y2="370" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Subgraph: Dash app -->
  <rect x="40" y="452" width="680" height="148" rx="14" fill="none" stroke="#993C1D" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="60" y="476" font-size="14" fill="#993C1D" font-weight="500">Ứng dụng Plotly Dash</text>

  <!-- G UI -->
  <rect x="60" y="492" width="170" height="86" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="145" y="528" text-anchor="middle" font-size="13" fill="#633806">Giao diện</text>
  <text x="145" y="546" text-anchor="middle" font-size="13" fill="#633806">người dùng UI</text>

  <!-- I model -->
  <rect x="300" y="492" width="170" height="86" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="385" y="528" text-anchor="middle" font-size="13" fill="#633806">Model dự đoán</text>
  <text x="385" y="546" text-anchor="middle" font-size="12" fill="#854F0B">Bất thường / Bình thường</text>

  <!-- J AI -->
  <rect x="540" y="492" width="160" height="86" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="620" y="528" text-anchor="middle" font-size="13" fill="#633806">Gọi API Trợ lý AI</text>
  <text x="620" y="546" text-anchor="middle" font-size="12" fill="#854F0B">Phân tích và giải thích</text>

  <!-- pkl dashed into model -->
  <line x1="265" y1="416" x2="320" y2="490" stroke="#888" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrowd)"/>
  <line x1="495" y1="416" x2="450" y2="490" stroke="#888" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrowd)"/>

  <!-- UI -> model -->
  <line x1="230" y1="525" x2="298" y2="525" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- model -> AI -->
  <line x1="470" y1="535" x2="538" y2="535" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- AI back to UI (return) -->
  <path d="M620 578 L620 592 L145 592 L145 580" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
